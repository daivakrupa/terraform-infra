version: 0.2

phases:
  install:
    commands:
      - set -e
      - echo "Installing Terraform 1.6.6"
      - yum -y install unzip curl >/dev/null 2>&1 || true
      - curl -sSLo terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - set -e
      - echo "Listing repository"
      - pwd
      - ls -R
      - echo "Switching to DEV root module"
      - cd envs/dev
      - terraform init -reconfigure -input=false

  build:
    commands:
      - set -e
      - echo "Terraform plan (DEV)"
      - terraform plan -input=false -no-color
      - echo "Terraform apply (DEV)"
      - terraform apply -auto-approve -input=false
